name: Mega-Linter

# Issue #67 introduced this workflow; issue #120 rescoped it after CI runtime
# concerns (see docs/decisions/2026-07-19-mega-linter-scan-scope.md) — three
# triggers, three purposes:
#  - pull_request into `develop`: diff-only scan (VALIDATE_ALL_CODEBASE:
#    false below) for fast lint feedback while developing.
#  - push into `develop`: full-codebase scan, so `develop` always has a
#    complete lint baseline even for changes a diff-only PR check couldn't
#    fully see (e.g. a squash-merge, or a direct push).
#  - weekly schedule (always runs against the repo's default branch, `main`,
#    regardless of any branch filter): full-codebase scan, then publish the
#    HTML report into `main` and sync that commit back into `develop`. This
#    is now the *only* trigger that publishes — the Pages report is treated
#    as a periodic repository health snapshot, not a per-merge artifact.
#    Mega-Linter no longer runs on push into `main` at all: `develop` ->
#    `main` merges are human-only and expected to carry little/no new diff,
#    so paying for a full scan on every such push added cost without much
#    signal.
on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
    paths-ignore:
      - "reports/**"
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC

permissions:
  contents: write

concurrency:
  group: mega-linter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  megalinter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mega-Linter
        uses: oxsecurity/megalinter@v8
        env:
          # Diff-only on PRs for fast feedback; full scan on push/schedule.
          # See docs/decisions/2026-07-19-mega-linter-scan-scope.md (issue #120).
          VALIDATE_ALL_CODEBASE: ${{ github.event_name != 'pull_request' }}
          # Report-only for now — the codebase has never been linted, so the
          # first run is expected to surface many findings. Revisit making
          # this blocking as a follow-up issue once findings are triaged.
          DISABLE_ERRORS: true
          # Fix (issue #67 CI failure): Mega-Linter has no built-in HTML
          # reporter (OUTPUT_FORMAT: html was never a recognized variable, so
          # megalinter-reports/*.html was never written). Using the Markdown
          # summary reporter instead and wrapping it in a static HTML shell
          # below — no new dependency, matches this repo's no-build-step rule.
          MARKDOWN_SUMMARY_REPORTER: true

      - name: Stage report under reports/lint
        run: |
          mkdir -p reports/lint
          SUMMARY_FILE=$(find megalinter-reports -maxdepth 1 -iname 'megalinter-report.md' -o -iname '*-summary.md' 2>/dev/null | head -n1)
          if [ -z "$SUMMARY_FILE" ]; then
            echo "::error::Mega-Linter markdown summary report not found under megalinter-reports/. Check MARKDOWN_SUMMARY_REPORTER's output filename upstream."
            ls -la megalinter-reports/ || true
            exit 1
          fi
          {
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Mega-Linter Report</title></head><body><pre>'
            sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' "$SUMMARY_FILE"
            echo '</pre></body></html>'
          } > reports/lint/megalinter-report.html

      - name: Upload report as CI artifact (develop feedback)
        if: github.event_name == 'pull_request' || github.ref_name == 'develop'
        uses: actions/upload-artifact@v4
        with:
          name: megalinter-report
          path: reports/lint/megalinter-report.html
          if-no-files-found: warn

      - name: Publish report to main
        # Only on the weekly schedule run (issue #120: the Pages report is a
        # periodic repository health snapshot, not a per-merge artifact, so
        # this no longer fires on every push to main). Uses the default
        # GITHUB_TOKEN, never a PAT/deploy key: pushes made with GITHUB_TOKEN
        # do not themselves trigger further workflow runs, which is what
        # keeps this from looping (push -> CI -> commit -> push -> CI -> ...).
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/lint/megalinter-report.html
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "chore: publish Mega-Linter report [skip ci]"
            git push
          fi

      - name: Sync report commit back into develop
        if: github.event_name == 'schedule'
        run: |
          git fetch origin develop
          git push origin HEAD:develop
