name: Trivy Security Scan

# Issue #67 — same two-trigger shape as docs/ci-drafts/mega-linter.yml:
# develop feedback (non-blocking) + publish to main after a human's
# develop -> main merge. See docs/decisions/2026-07-16-ci-tooling-defaults.md.
on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop, main]
    paths-ignore:
      - "reports/**"

permissions:
  contents: write
  # Issue #79: needed for the "Upload SARIF to GitHub Code Scanning" step below.
  security-events: write

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF)
        # Issue #87: dropped the format: template / "@contrib/html.tpl" step
        # that used to run here. That template path only resolves inside
        # Trivy's own checked-out source tree, not this runner's working
        # directory, so it always failed with "open contrib/html.tpl: no
        # such file or directory" and the whole job exited 1 before any
        # report could be produced. SARIF is a built-in Trivy format that
        # needs no external template, and per the human's step-3 decision on
        # #87 the report is linked to directly rather than rendered through
        # a custom HTML viewer, so a single scan step is now enough.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          # Report-only for now, same reasoning as Mega-Linter's DISABLE_ERRORS.
          exit-code: 0

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Stage report under reports/security
        run: |
          mkdir -p reports/security
          cp trivy-results.sarif reports/security/trivy.sarif

      - name: Upload report as CI artifact (develop feedback)
        if: github.ref_name == 'develop' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/security/trivy.sarif

      - name: Publish report to main
        # Same GITHUB_TOKEN-only rule as mega-linter.yml — see that file's
        # comment for why this doesn't loop.
        if: github.ref_name == 'main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/security/trivy.sarif
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "chore: publish Trivy report [skip ci]"
            git push
          fi
